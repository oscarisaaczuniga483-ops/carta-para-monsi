<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Feliz Cumpleaños!</title>
  <style>
    body {
      display: flex;
      justify-content: space-around; /* Espacio para las fotos laterales */
      align-items: center;
      height: 100vh;
      background-color: #ffeff3; /* Fondo rosa pálido */
      margin: 0;
      font-family: 'Arial', sans-serif;
      overflow: hidden; /* Evita barras de desplazamiento */
    }

    /* --- FOTOS LATERALES --- */
    .foto-lateral {
      width: 200px;
      height: 250px;
      object-fit: cover; /* Ajusta la foto sin deformarla */
      border-radius: 15px;
      border: 8px solid white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    /* --- ESCENA CENTRAL --- */
    .escena-central {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* My Melody (Arriba de la carta) */
    .my-melody-img {
      width: 120px;
      margin-bottom: -15px; /* Superposición ligera */
      z-index: 5;
    }

    /* Pastel (Abajo de la carta) */
    .pastel-img {
      width: 160px;
      margin-top: -20px; /* Superposición ligera */
      z-index: 5;
    }

    /* --- CARTA Y SOBRE (EN EL MEDIO) --- */
    .carta-contenedor {
      position: relative;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.3s ease; /* Pequeño efecto al tocar */
    }

    .carta-contenedor:active {
      transform: scale(0.95); /* Se encoge un poco al presionarla */
    }

    .sobre {
      position: relative;
      width: 300px;
      height: 200px;
      background-color: #ff9aaf; /* Color del sobre */
      border-radius: 0 0 10px 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    .solapa {
      position: absolute;
      top: 0;
      left: 0;
      border-left: 150px solid transparent;
      border-right: 150px solid transparent;
      border-top: 100px solid #ff7791; /* Solapa cerrada */
      transform-origin: top;
      transition: transform 0.6s ease, z-index 0.2s 0.3s;
      z-index: 4;
    }

    .frente-sobre {
      position: absolute;
      bottom: 0;
      left: 0;
      border-left: 150px solid transparent;
      border-right: 150px solid transparent;
      border-bottom: 100px solid #ff88a0;
      z-index: 3;
    }

    .papel-carta {
      position: absolute;
      bottom: 5px; /* Un poco visible */
      left: 20px;
      width: 260px;
      height: 180px;
      background-color: white;
      border-radius: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.6s ease 0.3s, z-index 0s 0.3s; /* Retraso para que la solapa se abra primero */
      z-index: 2;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
      opacity: 0.8; /* Se ve un poco transparente dentro */
    }

    /* Título de la carta dentro */
    .papel-carta h2 {
      color: #e91e63;
      margin-top: 10px;
    }

    /* --- ESTADO ABIERTO (Se activa con JS) --- */
    .carta-contenedor.abierta .solapa {
      transform: rotateX(180deg);
      z-index: 1; /* Se va detrás */
    }

    .carta-contenedor.abierta .papel-carta {
      transform: translateY(-130px); /* Sube la carta */
      z-index: 15; /* Sube por encima de todo */
      opacity: 1; /* Se vuelve opaca al salir */
    }

    /* Indicador "Tócame" */
    .tócame {
      position: absolute;
      bottom: 10px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 20;
      pointer-events: none; /* No interfiere con el clic */
    }
    .carta-contenedor.abierta .tócame {
      display: none;
    }

  </style>
</head>
<body>

  <audio id="musica-cumple" loop>
    <source src="ENLACE_DE_TU_MUSICA.mp3" type="audio/mpeg">
  </audio>

  <img src="ENLACE_IMAGEN_1" alt="Foto Cumpleañera 1" class="foto-lateral">

  <div class="escena-central">
    
    <img src="ENLACE_MY_MELODY" alt="My Melody" class="my-melody-img">

    <div class="carta-contenedor" id="carta" onclick="activarMusicaYCarta()">
      <div class="solapa"></div>
      <div class="sobre">
        <div class="papel-carta">
          <h2>¡Feliz Cumple!</h2>
          <p>Toca para ver tu mensaje...</p>
        </div>
        <div class="frente-sobre"></div>
        <div class="tócame">Tócala ❤️</div>
      </div>
    </div>

    <img src="ENLACE_PASTEL" alt="Pastel de Cumpleaños" class="pastel-img">

  </div>

  <img src="ENLACE_IMAGEN_2" alt="Foto Cumpleañera 2" class="foto-lateral">

  <script>
    function activarMusicaYCarta() {
      // 1. Obtener la carta y la música
      const cartaContenedor = document.getElementById('carta');
      const musica = document.getElementById('musica-cumple');

      // 2. Añadir la clase para abrir la carta
      cartaContenedor.classList.add('abierta');

      // 3. Reproducir la música (y manejar el posible bloqueo del navegador)
      musica.play().catch(error => {
        console.log("La reproducción automática fue bloqueada. Asegúrate de que ella interactuó con la página.", error);
      });
    }
  </script>

</body>
</html>
