<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Foto Izquierda -->
        <div class="photo-container" onclick="playMusic(this)">
            <div class="overlay">Tócame ✨</div>
            <img src="foto1.jpg" alt="Foto 1" class="photo">
        </div>

        <!-- Pastel Central -->
        <div class="cake-container">
            <img src="https://cdn-icons-png.flaticon.com/512/2830/2830405.png" alt="Pastel" class="cake">
            <h1>¡Feliz Cumpleaños!</h1>
        </div>

        <!-- Foto Derecha -->
        <div class="photo-container" onclick="playMusic(this)">
            <div class="overlay">Tócame ✨</div>
            <img src="foto2.jpg" alt="Foto 2" class="photo">
        </div>
    </div>

    <!-- Archivo de música -->
    <audio id="birthday-song">
        <source src="musica.mp3" type="audio/mpeg">
        Tu navegador no soporta el audio.
    </audio>

    <script src="script.js"></script>
</body>
</html>
