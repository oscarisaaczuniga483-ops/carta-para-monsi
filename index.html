<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="escena">
        <div class="foto-lateral" onclick="interactuar(this)">
            <div class="tapa">Tócame ✨</div>
            <img src="foto1.jpg" alt="Recuerdo 1">
        </div>

        <div class="centro">
            <div id="contenedor-pastel" onclick="revelarCarta()">
                <img src="https://img.icons8.com/fluency/512/birthday-cake.png" alt="Pastel Grande 3 Capas" class="pastel-animado-gigante">
                <p class="instruccion">Toca el pastel mágico</p>
            </div>

            <div id="contenedor-carta" class="oculto">
                <div class="carta">
                    <h3>Para mi persona favorita</h3>
                    <div class="texto-carta">
                        <p>¡Hola! Las fotos de los lados se quedaron aquí contigo.</p>
                        <p>Dime qué quieres que escriba aquí.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="foto-lateral" onclick="interactuar(this)">
            <div class="tapa">Tócame ✨</div>
            <img src="foto2.jpg" alt="Recuerdo 2">
        </div>
    </div>

    <audio id="musica-cumple">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
